<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 741 356" width="741" height="356" role="img" aria-label="ZenoDEX deterministic settlement: real terminal output">
  <title>ZenoDEX deterministic settlement — real terminal output</title>
  <style>
    .term { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 15px; }
    .term text { fill: #d7e2dd; white-space: pre; }
    .term .pr { fill: #44c7b5; font-weight: 700; }
    .term .cm { fill: #80978d; }
    .term .ok { fill: #46d39a; font-weight: 700; }
    .term .no { fill: #e0a64e; font-weight: 700; }
  </style>
  <rect x="0" y="0" width="741" height="356" rx="12" fill="#0d1411" stroke="#22302b"/>
  <rect x="0" y="0" width="741" height="34" rx="12" fill="#15211d"/>
  <rect x="0" y="22" width="741" height="12" fill="#15211d"/>
  <circle cx="20" cy="17" r="5" fill="#ff5f56"/>
  <circle cx="38" cy="17" r="5" fill="#ffbd2e"/>
  <circle cx="56" cy="17" r="5" fill="#27c93f"/>
  <text x="370" y="21" text-anchor="middle" class="term" style="font-size:12px" fill="#7f9b91">ZenoDEX deterministic settlement</text>
  <clipPath id="reveal">
    <rect x="0" y="34" width="741" height="0">
      <animate attributeName="height" values="0;322;322" keyTimes="0;0.6481;1" dur="6.82s" repeatCount="indefinite"/>
    </rect>
  </clipPath>
  <g class="term" clip-path="url(#reveal)">
        <text x="18" y="67"><tspan class="pr">$</tspan> python3 demos/zenodex_settlement_demo.py</text>
    <text x="18" y="89"><tspan class="cm"># deterministic batch settlement   pool X=1,000,000 Y=1,000,000   integer-only AMM</tspan></text>
    <text x="18" y="111"><tspan class="cm"># canonical order  -&gt;  exact integer math  -&gt;  replayable certificate</tspan></text>
    <text x="18" y="133"></text>
    <text x="18" y="155">  swap s1   +1000 X  -&gt;   999 Y     (exact integer floor)</text>
    <text x="18" y="177">  swap s2   + 500 X  -&gt;   498 Y     (exact integer floor)</text>
    <text x="18" y="199">  swap s3   +2000 X  -&gt;  1990 Y     (exact integer floor)</text>
    <text x="18" y="221">  final reserves   X=1,003,500   Y=996,513</text>
    <text x="18" y="243">  certificate      sha256=c1270e05ca1af8b2db62e709...</text>
    <text x="18" y="265"></text>
    <text x="18" y="287">  replay (reordered inputs)        <tspan class="ok">MATCHES</tspan> -&gt; assurance holds</text>
    <text x="18" y="309">  tamper one order (s2: 500-&gt;600)  <tspan class="no">DIFFERS</tspan> -&gt; tamper detected</text>
    <text x="18" y="331">  integer math is exact: no floating-point drift, bit-reproducible certificate</text>
    <rect x="18" y="320" width="9" height="16" fill="#44c7b5">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
